<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ CILA - 10 Foto Spesial ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 0, 100, 0.3);
            position: relative;
            z-index: 10;
        }
        
        h1 {
            color: #d43f5e;
            font-size: 3.5em;
            margin-bottom: 10px;
        }
        
        .music-player {
            background: #ffe4e9;
            border-radius: 30px;
            padding: 15px;
            margin: 15px 0;
        }
        
        audio {
            width: 100%;
            height: 45px;
        }
        
        .foto-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            background: #fff0f5;
            border-radius: 30px;
            padding: 10px;
        }
        
        #fotoCila {
            max-width: 100%;
            max-height: 330px;
            border-radius: 30px;
            border: 4px solid #ffb6c1;
            transition: all 0.5s;
        }
        
        .foto-enter {
            animation: fotoMasuk 0.8s ease-out;
        }
        
        @keyframes fotoMasuk {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }
        
        .btn-cinta {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3em;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            border: 2px solid white;
            transition: all 0.3s;
        }
        
        .btn-cinta:active {
            transform: scale(0.95);
        }
        
        .btn-reset {
            background: linear-gradient(45deg, #a55c7b, #b86b8b);
        }
        
        .pesan-romantis {
            background: rgba(255, 240, 245, 0.9);
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            font-size: 1.2em;
            color: #9d3b5c;
            font-style: italic;
            border-left: 5px solid #ff4d6d;
            animation: fadePesan 1s;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes fadePesan {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .counter {
            background: #ffe4e9;
            color: #a53860;
            padding: 12px;
            border-radius: 40px;
            margin: 15px 0;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .love-bubble {
            position: fixed;
            bottom: 0;
            color: rgba(255, 80, 120, 0.8);
            font-size: 20px;
            pointer-events: none;
            z-index: 9999;
            animation: bubbleUp 4s linear forwards;
            filter: drop-shadow(0 0 5px rgba(255, 0, 100, 0.5));
        }
        
        @keyframes bubbleUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
        }
        
        .footer {
            margin-top: 15px;
            color: #a53860;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ CILA ✨</h1>
        
        <!-- Music Player -->
        <div class="music-player">
            <audio controls>
                <source src="https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/videoplayback.webm" type="audio/webm">
            </audio>
        </div>
        
        <!-- Foto Container -->
        <div class="foto-container">
            <img id="fotoCila" src="" alt="Foto Cila" class="foto-enter">
        </div>
        
        <!-- Pesan Romantis -->
        <div class="pesan-romantis" id="pesanRomantis">
            ❤️ Cila, kamu alasan aku tersenyum hari ini ❤️
        </div>
        
        <!-- Tombol -->
        <div class="btn-group">
            <button class="btn-cinta" id="nextFotoBtn">❤️ GANTI FOTO CILA ❤️</button>
            <button class="btn-cinta btn-reset" id="resetBtn">🔄 ULANG DARI AWAL</button>
        </div>
        
        <!-- Counter -->
        <div class="counter">
            📸 Foto ke: <span id="fotoCounter">1</span>/10 | ❤️ Cinta: <span id="cintaCounter">0</span>
        </div>
        
        <div class="footer">
            💝 10 foto, 10 alasan cinta buat Cila 💝
        </div>
    </div>

    <script>
        // === 10 FOTO CILA ===
        const fotoList = [
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0040.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0041.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0042.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0006.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0007.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0010.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0011.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0013.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0014.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/Proyek%20Baru%201%20%5B9EBBBA2%5D.png'
        ];

        // === PESAN ROMANTIS ===
        const pesanList = [
            "❤️ Cila, senyum kamu tuh kayak sunrise di hati aku.",
            "🥰 Setiap liat foto kamu, rasanya dunia jadi indah.",
            "💕 Dari 10 foto ini, yang paling aku suka ya kamu aslinya.",
            "🌹 Cila, kamu tuh alasan aku bangun pagi dengan senyum.",
            "✨ Kalo cinta itu berat, berarti aku angkat beban tiap hari mikirin kamu.",
            "😘 10 foto, 10 alasan buat makin cinta sama kamu.",
            "💗 Kamu tuh kayak bintang, selalu bersinar walaupun gelap.",
            "🎈 Aku rela antri sepanjang hayat, asal ujungnya kamu.",
            "💘 Cilaaaa... tahu gak? aku lagi senyum-senyum sendiri ngetik ini.",
            "🔥 Pokoknya, Cila is the best thing in my life!"
        ];

        // Variabel
        let fotoIndex = 0;
        let fotoCounter = 1;
        let cintaCount = 0;

        // Element references
        const fotoElement = document.getElementById('fotoCila');
        const fotoCounterElement = document.getElementById('fotoCounter');
        const cintaCounterElement = document.getElementById('cintaCounter');
        const pesanElement = document.getElementById('pesanRomantis');

        // Fungsi Love Bubbles
        function createLoveBubbles(jumlah = 15) {
            const loveSymbols = ['❤️', '💕', '💗', '💓', '💖', '💘', '💝'];
            
            for (let i = 0; i < jumlah; i++) {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'love-bubble';
                    bubble.innerHTML = loveSymbols[Math.floor(Math.random() * loveSymbols.length)];
                    bubble.style.left = Math.random() * window.innerWidth + 'px';
                    bubble.style.fontSize = (Math.random() * 30 + 15) + 'px';
                    
                    const hue = Math.random() * 20 + 340;
                    bubble.style.color = `hsl(${hue}, 80%, 70%)`;
                    
                    document.body.appendChild(bubble);
                    
                    setTimeout(() => {
                        bubble.remove();
                    }, 4000);
                }, i * 50);
            }
        }

        // Fungsi Ganti Foto
        function gantiFoto() {
            fotoIndex = (fotoIndex + 1) % fotoList.length;
            fotoCounter = fotoIndex + 1;
            
            fotoElement.src = fotoList[fotoIndex];
            
            // Animasi
            fotoElement.classList.remove('foto-enter');
            void fotoElement.offsetWidth;
            fotoElement.classList.add('foto-enter');
            
            // Update counter
            fotoCounterElement.innerText = fotoCounter;
            
            // Tambah cinta
            cintaCount++;
            cintaCounterElement.innerText = cintaCount;
            
            // Ganti pesan random
            const randomPesanIndex = Math.floor(Math.random() * pesanList.length);
            pesanElement.innerText = pesanList[randomPesanIndex];
            
            // Animasi pesan
            pesanElement.style.animation = 'none';
            void pesanElement.offsetHeight;
            pesanElement.style.animation = 'fadePesan 1s';
            
            // Munculin love bubbles
            createLoveBubbles(20);
            
            // Love besar di tengah
            setTimeout(() => {
                const bigLove = document.createElement('div');
                bigLove.className = 'love-bubble';
                bigLove.innerHTML = '💘';
                bigLove.style.left = '50%';
                bigLove.style.transform = 'translateX(-50%)';
                bigLove.style.bottom = '50%';
                bigLove.style.fontSize = '60px';
                bigLove.style.animation = 'bubbleUp 3s forwards';
                document.body.appendChild(bigLove);
                
                setTimeout(() => bigLove.remove(), 3000);
            }, 200);
        }

        // Fungsi Reset
        function resetWeb() {
            fotoIndex = 0;
            fotoCounter = 1;
            cintaCount = 0;
            
            fotoElement.src = fotoList[0];
            fotoCounterElement.innerText = '1';
            cintaCounterElement.innerText = '0';
            pesanElement.innerText = "❤️ Cila, kamu alasan aku tersenyum hari ini ❤️";
            
            fotoElement.classList.remove('foto-enter');
            void fotoElement.offsetWidth;
            fotoElement.classList.add('foto-enter');
            
            createLoveBubbles(10);
        }

        // Init
        fotoElement.src = fotoList[0];

        // Event Listeners
        document.getElementById('nextFotoBtn').addEventListener('click', function(e) {
            gantiFoto();
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = '';
            }, 200);
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            resetWeb();
        });

        // Klik di mana aja
        document.body.addEventListener('click', function(e) {
            if (!e.target.classList.contains('btn-cinta') && !e.target.classList.contains('btn-reset')) {
                createLoveBubbles(5);
            }
        });

        // Welcome
        setTimeout(() => {
            createLoveBubbles(15);
        }, 500);
    </script>
</body>

        function gantiFoto() {
            index = (index + 1) % fotoList.length;
            img.src = fotoList[index];
            fotoSpan.innerText = index + 1;
            
            // Ganti pesan random
            const random = Math.floor(Math.random() * pesanList.length);
            pesanDiv.innerText = "❤️ " + pesanList[random] + " ❤️";
        }

        function reset() {
            index = 0;
            img.src = fotoList[0];
            fotoSpan.innerText = '1';
            pesanDiv.innerText = "❤️ CILA, KAMU SPESIAL ❤️";
        }

        document.getElementById('nextBtn').onclick = gantiFoto;
        document.getElementById('resetBtn').onclick = reset;
    </script>
