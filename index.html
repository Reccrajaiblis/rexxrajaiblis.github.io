    <style>

            background: pink;

            padding: 15px;

        .box {
            max-width: 500px;
            width: 100%;

            padding: 25px;

            box-shadow: 0 10px 30px red;
        }
        h1 {
            color: #d43f5e;
            font-size: 45px;

            background: #ffe4e9;

            font-size: 18px;
            color: #b23b4b;
            border-left: 5px solid #ff4d6d;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .counter {
            background: #ffe4e9;
            padding: 12px;
            border-radius: 40px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
            color: #a53860;
        }
        .footer {
            color: #a53860;
            margin-top: 15px;

        }
        audio {
            width: 100%;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>❤️ CILA ❤️</h1>
        
        <!-- Lagu -->
        <audio controls>
            <source src="https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/videoplayback.webm">
        </audio>
        
        <!-- Foto -->
        <img id="foto" src="https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0040.jpg">
        
        <!-- Pesan -->
        <div class="pesan" id="pesan">
            CILA, KAMU CANTIK BANGET ❤️
        </div>
        
        <!-- Tombol -->
        <button class="tombol" onclick="ganti()">GANTI FOTO</button>
        <button class="tombol ungu" onclick="reset()">RESET</button>
        
        <!-- Counter -->
        <div class="counter" id="counter">
            Foto ke 1 dari 10
        </div>
        
        <div class="footer">
            Buat Cila tersayang 💕
        </div>
    </div>

    <script>
        // Daftar 10 foto
        const foto = [
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0040.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0041.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0042.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0006.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0007.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0010.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0011.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0013.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0014.jpg',
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/Proyek%20Baru%201%20%5B9EBBBA2%5D.png'
        ];

        // Pesan romantis
        const pesanList = [
            "CILA, CANTIK BANGET!",
            "SENYUM KAMU MANIS",
            "FOTO INI FAVORIT AKU",
            "KAMU BINTANGKU",
            "CILA SAYANG ❤️",
            "CANTIKNYA GA BOSEN",
            "HARI INI CERAH KARENA KAMU",
            "CILA IS THE BEST",
            "MAKIN CINTA SAMA CILA",
            "10 FOTO, 1 HATI"
        ];

        let nomor = 0;
        const gambar = document.getElementById('foto');
        const teksPesan = document.getElementById('pesan');
        const teksCounter = document.getElementById('counter');

        function ganti() {
            nomor = (nomor + 1) % foto.length;
            gambar.src = foto[nomor];
            teksCounter.innerText = 'Foto ke ' + (nomor + 1) + ' dari 10';
            
            // Pesan random
            const acak = Math.floor(Math.random() * pesanList.length);
            teksPesan.innerText = '❤️ ' + pesanList[acak] + ' ❤️';
        }

        function reset() {
            nomor = 0;
            gambar.src = foto[0];
            teksCounter.innerText = 'Foto ke 1 dari 10';
            teksPesan.innerText = 'CILA, KAMU CANTIK BANGET ❤️';
        }
    </script>
</body>
</html>    <div class="pesan-romantis" id="pesanRomantis">
            ❤️ Cila, kamu alasan aku tersenyum hari ini ❤️
        </div>
        
        <div class="footer">
            <p>10 foto, 10 alasan, 1 hati buat Cila 💕</p>
        </div>
    </div>

    <script>
        // ========== KONFIGURASI FOTO CILA (SUDAH DIISI LENGKAP) ==========
        const fotoList = [
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0040.jpg', // foto1
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0041.jpg', // foto2
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260308-WA0042.jpg', // foto3
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0006.jpg', // foto4
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0007.jpg', // foto5
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0010.jpg', // foto6
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0011.jpg', // foto7 (link sudah diperbaiki)
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0013.jpg', // foto8
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/IMG-20260309-WA0014.jpg', // foto9
            'https://raw.githubusercontent.com/Reccrajaiblis/rexxrajaiblis.github.io/main/Proyek%20Baru%201%20%5B9EBBBA2%5D.png' // foto10
        ];
        
        // ========== PESAN ROMANTIS ==========
        const pesanList = [
            "❤️ Cila, senyum kamu tuh kayak sunrise di hati aku.",
            "🥰 Setiap liat foto kamu, rasanya dunia jadi indah.",
            "💕 Dari 10 foto ini, yang paling aku suka ya kamu aslinya.",
            "🌹 Cila, kamu tuh alasan aku bangun pagi dengan senyum.",
            "✨ Kalo cinta itu berat, berarti aku angkat beban tiap hari mikirin kamu.",
            "😘 10 foto, 10 alasan buat makin cinta sama kamu.",
            "💗 Kamu tuh kayak bintang, selalu bersinar walaupun gelap.",
            "🎈 Aku rela antri sepanjang hayat, asal ujungnya kamu.",
            "💘 Cilaaaa... tahu gak? aku lagi senyum-senyum sendiri ngetik ini.",
            "🔥 Pokoknya, Cila is the best thing in my life!"
        ];
        
        // ========== VARIABEL ==========
        let fotoIndex = 0;
        let cintaCount = 0;
        let fotoCounter = 1;
        
        // ========== ELEMENT REFERENCES ==========
        const fotoElement = document.getElementById('fotoCila');
        const fotoCounterElement = document.getElementById('fotoCounter');
        const cintaCounterElement = document.getElementById('cintaCounter');
        const progressBar = document.getElementById('progressBar');
        const pesanElement = document.getElementById('pesanRomantis');
        
        // ========== FUNGSI GELEMBUNG LOVE ==========
        function createLoveBubbles(jumlah = 15) {
            const loveSymbols = ['❤️', '💕', '💗', '💓', '💖', '💘', '💝', '💞', '💟', '😍', '🥰', '😘'];
            
            for (let i = 0; i < jumlah; i++) {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'love-bubble';
                    
                    const randomLove = loveSymbols[Math.floor(Math.random() * loveSymbols.length)];
                    bubble.innerHTML = randomLove;
                    
                    bubble.style.left = Math.random() * window.innerWidth + 'px';
                    bubble.style.bottom = '0px';
                    bubble.style.top = 'auto';
                    
                    const size = Math.random() * 30 + 20;
                    bubble.style.fontSize = size + 'px';
                    
                    const hue = Math.random() * 20 + 340;
                    bubble.style.color = `hsl(${hue}, 80%, 70%)`;
                    
                    bubble.style.animationDelay = Math.random() * 0.5 + 's';
                    
                    document.body.appendChild(bubble);
                    
                    setTimeout(() => {
                        bubble.remove();
                    }, 4000);
                }, i * 50);
            }
        }
        
        // ========== FUNGSI GANTI FOTO ==========
        function gantiFoto() {
            fotoIndex = (fotoIndex + 1) % fotoList.length;
            fotoCounter = fotoIndex + 1;
            
            fotoElement.src = fotoList[fotoIndex];
            
            fotoElement.classList.remove('foto-enter');
            void fotoElement.offsetWidth;
            fotoElement.classList.add('foto-enter');
            
            fotoCounterElement.innerText = fotoCounter;
            
            const progressPercent = (fotoCounter / fotoList.length) * 100;
            progressBar.style.width = progressPercent + '%';
            progressBar.innerText = Math.round(progressPercent) + '%';
            
            cintaCount++;
            cintaCounterElement.innerText = cintaCount;
            
            const randomPesanIndex = Math.floor(Math.random() * pesanList.length);
            pesanElement.innerText = pesanList[randomPesanIndex];
            pesanElement.style.animation = 'none';
            void pesanElement.offsetHeight;
            pesanElement.style.animation = 'fadePesan 1s';
            
            createLoveBubbles(20);
            
            setTimeout(() => {
                const bigLove = document.createElement('div');
                bigLove.className = 'love-bubble';
                bigLove.innerHTML = '💘';
                bigLove.style.left = '50%';
                bigLove.style.transform = 'translateX(-50%)';
                bigLove.style.bottom = '50%';
                bigLove.style.fontSize = '60px';
                bigLove.style.animation = 'bubbleUp 3s forwards';
                document.body.appendChild(bigLove);
                
                setTimeout(() => bigLove.remove(), 3000);
            }, 200);
        }
        
        // ========== FUNGSI RESET ==========
        function resetWeb() {
            fotoIndex = 0;
            fotoCounter = 1;
            cintaCount = 0;
            
            fotoElement.src = fotoList[0];
            fotoCounterElement.innerText = '1';
            cintaCounterElement.innerText = '0';
            progressBar.style.width = '10%';
            progressBar.innerText = '10%';
            pesanElement.innerText = "❤️ Cila, kamu alasan aku tersenyum hari ini ❤️";
            
            fotoElement.classList.remove('foto-enter');
            void fotoElement.offsetWidth;
            fotoElement.classList.add('foto-enter');
            
            createLoveBubbles(10);
        }
        
        // ========== FUNGSI INIT ==========
        function initWeb() {
            if (fotoList.length > 0) {
                fotoElement.src = fotoList[0];
            }
            
            progressBar.style.width = '10%';
            progressBar.innerText = '10%';
            
            setTimeout(() => {
                createLoveBubbles(15);
            }, 500);
            
            setTimeout(() => {
                alert('💕 Halo Cila! Siap-siap lihat 10 fotomu! 💕');
            }, 1000);
        }
        
        // ========== EVENT LISTENER ==========
        document.getElementById('nextFotoBtn').addEventListener('click', function(e) {
            gantiFoto();
            
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = '';
            }, 200);
        });
        
        document.getElementById('resetBtn').addEventListener('click', function() {
            resetWeb();
        });
        
        document.body.addEventListener('click', function(e) {
            if (!e.target.classList.contains('btn-cinta') && !e.target.classList.contains('btn-reset')) {
                createLoveBubbles(5);
            }
        });
        
        window.addEventListener('load', initWeb);
    </script>
</body>
</html>

<body>

            </audio>

        <!-- Foto -->

        function gantiFoto() {
            index = (index + 1) % fotoList.length;

        function reset() {
